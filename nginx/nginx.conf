user nginx;
worker_processes auto;

events {
    worker_connections 2048;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # --- 502 BAD GATEWAY FIX: DNS & BUFFERING ---
    # Docker internal DNS (Zaroori hai taaki Nginx 'server' container ko dhoond sake)
    resolver 127.0.0.11 valid=30s;

    # Bade headers aur images handle karne ke liye
    client_header_buffer_size 64k;
    large_client_header_buffers 8 64k;
    client_max_body_size 50M;

    # Proxy buffer settings
    proxy_buffer_size   128k;
    proxy_buffers       4 256k;
    proxy_busy_buffers_size     256k;

    server {
        listen 80;
        server_name 13.233.206.185;

        # Timeouts (Backend processing ke liye)
        proxy_read_timeout 600s;
        proxy_connect_timeout 600s;
        proxy_send_timeout 600s;

        # Frontend Proxy
        location / {
            proxy_pass http://client:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Backend API Proxy
        location /api/ {
            # Backend API Proxy
        location /api/ {
            # DNS resolver taaki Nginx 'server' container ko pehchane
            resolver 127.0.0.11 valid=30s;
            set $backend_url http://server:4000;
            proxy_pass $backend_url;

            proxy_http_version 1.1;

            # Browser ke liye headers ko clean rakhein
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # WebSocket support (agar backend use karta hai)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            # 502 Bad Gateway Fix: Buffers ko specifically yahan define karein
            proxy_buffer_size          128k;
            proxy_buffers              4 256k;
            proxy_busy_buffers_size    256k;

            # Timeouts (Backend ko processing ka poora time dein)
            proxy_read_timeout 600s;
            proxy_connect_timeout 600s;
        }
        }
    }
}
